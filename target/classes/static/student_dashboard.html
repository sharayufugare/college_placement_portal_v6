<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Elevate | Student Dashboard - PCCOER</title>
    <script src="api.js"></script>
    <script>
        (function() {
            const studentId = localStorage.getItem('studentId');
            const studentToken = localStorage.getItem('token');
            if (!studentId || !studentToken) {
                window.location.replace('student_login.html');
            }
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, rgba(67, 97, 238, 0.08) 0%, rgba(58, 12, 163, 0.05) 100%), #f4f7fc;
            font-family: 'Inter', sans-serif;
            padding: 28px 24px;
            min-height: 100vh;
        }

        /* Modern scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #eef2f9;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #b9c4d9;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #8f9bb3;
        }

        :root {
            --primary: #4361ee;
            --primary-dark: #3048c7;
            --secondary: #3a0ca3;
            --accent: #4cc9f0;
            --light-bg: #ffffff;
            --dark-text: #1e293b;
            --gray-text: #5b6e8c;
            --border-light: #e9edf2;
            --success: #10b981;
            --success-dark: #059669;
            --warning: #f59e0b;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 20px 30px -12px rgba(0, 0, 0, 0.12);
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header modern */
        .dashboard-header {
            background: var(--light-bg);
            backdrop-filter: blur(0px);
            border-radius: var(--radius-lg);
            padding: 18px 28px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(67, 97, 238, 0.12);
            transition: all 0.2s ease;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px -6px rgba(67, 97, 238, 0.35);
        }

        .brand-icon i {
            font-size: 24px;
            color: white;
        }

        .dashboard-header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .action-btn {
            background: #f1f5f9;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--dark-text);
        }

        .action-btn i {
            font-size: 14px;
            color: var(--primary);
        }

        .action-btn:hover {
            background: #e6edf4;
            transform: translateY(-2px);
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn i {
            color: var(--danger);
        }

        .logout-btn:hover {
            background: var(--danger);
            color: white;
            transform: translateY(-2px);
        }
        .logout-btn:hover i {
            color: white;
        }

        /* Alert toasts */
        .alert {
            padding: 14px 20px;
            border-radius: 60px;
            margin-bottom: 24px;
            display: none;
            font-weight: 500;
            font-size: 14px;
            backdrop-filter: blur(8px);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .alert-success {
            background: #e6f7ed;
            border-left: 4px solid var(--success);
            color: #0b5e42;
        }
        .alert-error {
            background: #fee9e6;
            border-left: 4px solid var(--danger);
            color: #b91c1c;
        }

        /* Grid layout */
        .dashboard-content {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 28px;
        }

        @media (max-width: 900px) {
            .dashboard-content {
                grid-template-columns: 1fr;
            }
        }

        /* Cards premium */
        .card {
            background: var(--light-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            padding: 28px;
            transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
            border: 1px solid var(--border-light);
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f0f3f9;
        }

        .card-header i {
            font-size: 26px;
            background: linear-gradient(145deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .card-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--dark-text);
            letter-spacing: -0.2px;
        }

        /* Profile grid */
        .profile-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .info-item {
            background: #fafcff;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid #f0f4fa;
        }

        .info-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #7c8ea0;
            margin-bottom: 6px;
        }

        .info-value {
            font-size: 15px;
            font-weight: 500;
            color: var(--dark-text);
            word-break: break-word;
        }

        /* Upload section */
        .upload-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .upload-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 18px;
            background: #fbfdff;
            border-radius: var(--radius-md);
            border: 1px solid #eef3fc;
            transition: all 0.2s;
        }
        .upload-item:hover {
            background: #ffffff;
            border-color: #dce5f0;
        }
        .upload-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(145deg, #f0f4ff, #e9effa);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 26px;
        }
        .upload-content {
            flex: 1;
        }
        .upload-content h4 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
            color: #1e2a3e;
        }
        .upload-content p {
            font-size: 12px;
            color: #7f8fa4;
            margin-bottom: 12px;
        }
        .file-input {
            display: none;
        }
        .file-label {
            background: #f1f5f9;
            color: var(--dark-text);
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-block;
            margin-right: 10px;
        }
        .file-label:hover {
            background: #e2e8f0;
        }
        .upload-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 8px 22px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .upload-btn:hover {
            background: var(--success-dark);
            transform: scale(0.96);
        }

        /* Form styles modern */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        @media (max-width: 640px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
        .form-group {
            margin-bottom: 6px;
        }
        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: #4a5a72;
            margin-bottom: 6px;
            display: block;
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: #fefefe;
            border: 1.5px solid #e2e9f2;
            border-radius: 14px;
            font-size: 14px;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.12);
            background: white;
        }
        textarea.form-control {
            resize: vertical;
            min-height: 90px;
        }
        .full-width {
            grid-column: 1 / -1;
        }
        .save-btn {
            background: linear-gradient(95deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 18px;
            width: auto;
            box-shadow: 0 4px 10px rgba(67, 97, 238, 0.25);
        }
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(67, 97, 238, 0.35);
        }

        /* status badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-complete {
            background: #e0f2e9;
            color: #0a6e48;
        }
        .status-pending {
            background: #fff1e0;
            color: #c47d2e;
        }

        /* empty state */
        .empty-value {
            color: #a0afc3;
            font-style: italic;
            font-weight: 400;
        }

        /* Responsive */
        @media (max-width: 600px) {
            body { padding: 16px; }
            .card { padding: 20px; }
            .profile-info { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="dashboard-header">
        <div class="brand">
            <div class="brand-icon">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <h1>Student Central</h1>
        </div>
        <div class="header-actions">
            <button class="action-btn" onclick="window.location.href='student-application.html'">
                <i class="fas fa-briefcase"></i> My Applications
            </button>
            <button class="action-btn" onclick="window.location.href='companies.html'">
                <i class="fas fa-building"></i> Companies
            </button>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Exit
            </button>
        </div>
    </div>

    <div class="alert alert-success" id="successAlert">
        <i class="fas fa-check-circle" style="margin-right: 8px;"></i> <span id="successMsg"></span>
    </div>
    <div class="alert alert-error" id="errorAlert">
        <i class="fas fa-exclamation-circle" style="margin-right: 8px;"></i> <span id="errorMsg"></span>
    </div>

    <div class="dashboard-content">
        <!-- Profile Card (enhanced) -->
        <div class="card">
            <div class="card-header">
                <i class="fas fa-user-circle"></i>
                <h2>Profile Overview</h2>
            </div>
            <div id="profile" class="profile-info">
                <!-- dynamic profile -->
            </div>
        </div>

        <!-- Upload Documents Card -->
        <div class="card">
            <div class="card-header">
                <i class="fas fa-cloud-upload-alt"></i>
                <h2>Document Hub</h2>
            </div>
            <div class="upload-section">
                <div class="upload-item">
                    <div class="upload-icon">
                        <i class="fas fa-file-alt"></i>
                    </div>
                    <div class="upload-content">
                        <h4>Resume / CV</h4>
                        <p>PDF only • Max 5 MB</p>
                        <input type="file" id="resumeFile" class="file-input" accept=".pdf">
                        <label for="resumeFile" class="file-label" id="resumeLabel">📎 Choose PDF</label>
                        <button class="upload-btn" onclick="uploadResume()"><i class="fas fa-upload"></i> Upload</button>
                    </div>
                </div>

                <div class="upload-item">
                    <div class="upload-icon">
                        <i class="fas fa-id-badge"></i>
                    </div>
                    <div class="upload-content">
                        <h4>Profile Photo</h4>
                        <p>JPG or PNG • Max 2 MB</p>
                        <input type="file" id="photoFile" class="file-input" accept=".jpg,.jpeg,.png">
                        <label for="photoFile" class="file-label" id="photoLabel">📸 Choose image</label>
                        <button class="upload-btn" onclick="uploadPhoto()"><i class="fas fa-upload"></i> Upload</button>
                    </div>
                </div>
                <div class="upload-item">
                    <div class="upload-icon">
                        <i class="fas fa-certificate"></i>
                    </div>
                    <div class="upload-content">
                        <h4>Technical Course Certificate</h4>
                        <p>PDF / JPG / PNG • Max 5 MB</p>
                        <input type="file" id="certificateFile" class="file-input" accept=".pdf,.jpg,.jpeg,.png">
                        <label for="certificateFile" class="file-label" id="certificateLabel">🏅 Choose certificate</label>
                        <button class="upload-btn" onclick="uploadCertificate()"><i class="fas fa-upload"></i> Upload</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Update Profile Card - CRITERIA REMOVED -->
        <div class="card full-width" style="grid-column: 1 / -1;">
            <div class="card-header">
                <i class="fas fa-pen-fancy"></i>
                <h2>Edit Profile Details</h2>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label><i class="far fa-user"></i> Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="e.g. Aditya Sharma">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-code"></i> Skills</label>
                    <input type="text" id="skills" class="form-control" placeholder="Java, Python, React, AWS">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-chart-line"></i> CGPA</label>
                    <input type="number" id="cgpa" class="form-control" placeholder="9.8" step="0.01" min="0" max="10">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-graduation-cap"></i> Branch</label>
                    <input type="text" id="branch" class="form-control" placeholder="Computer Engineering">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-calendar-alt"></i> Year</label>
                    <input type="text" id="year" class="form-control" placeholder="Third Year / 2025">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone-alt"></i> Phone</label>
                    <input type="tel" id="phone" class="form-control" placeholder="+91 9876543210">
                </div>
                <div class="form-group">
                    <label><i class="fab fa-linkedin"></i> LinkedIn</label>
                    <input type="url" id="linkedin" class="form-control" placeholder="https://linkedin.com/in/username">
                </div>
                <div class="form-group">
                    <label><i class="fab fa-github"></i> GitHub</label>
                    <input type="url" id="github" class="form-control" placeholder="https://github.com/username">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-venus-mars"></i> Gender</label>
                    <input type="text" id="gender" class="form-control" placeholder="Male / Female / Other">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-calendar-day"></i> DOB</label>
                    <input type="date" id="dob" class="form-control">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-percent"></i> 10%</label>
                    <input type="text" id="tenthPercentage" class="form-control" placeholder="e.g. 89.60">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-percent"></i> 12% / Diploma%</label>
                    <input type="text" id="twelfthOrDiplomaPercentage" class="form-control" placeholder="e.g. 78.00">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-percent"></i> BE/BTech%</label>
                    <input type="text" id="beBtechPercentage" class="form-control" placeholder="e.g. 74.12">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-graduation-cap"></i> Degree</label>
                    <input type="text" id="degree" class="form-control" placeholder="B.E / B.Tech / MCA">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-layer-group"></i> Specialization</label>
                    <input type="text" id="specialization" class="form-control" placeholder="Computer Engineering">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-calendar-check"></i> Year of Graduation</label>
                    <input type="text" id="graduationYear" class="form-control" placeholder="2026">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-university"></i> College Name</label>
                    <input type="text" id="collegeName" class="form-control" placeholder="PCCOER">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-tools"></i> Skill Expert In (multiple)</label>
                    <input type="text" id="skillExpertise" class="form-control" placeholder="Java, SQL, Python, React">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-book"></i> Technical Course / Certification</label>
                    <input type="text" id="technicalCourseCertification" class="form-control" placeholder="Yes / No + course details">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-building"></i> Agency / Platform</label>
                    <input type="text" id="certificationAgency" class="form-control" placeholder="Coursera / Udemy / NPTEL">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-clock"></i> Duration (hours)</label>
                    <input type="text" id="certificationDurationHours" class="form-control" placeholder="40">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-ban"></i> Active Backlog</label>
                    <input type="text" id="activeBacklog" class="form-control" placeholder="0 / 1 / details">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-code"></i> CodeChef Rating + Link</label>
                    <input type="text" id="codechefRating" class="form-control" placeholder="Rating">
                    <input type="url" id="codechefLink" class="form-control" placeholder="https://www.codechef.com/users/..." style="margin-top:8px;">
                </div>
                <div class="form-group">
                    <label><i class="fab fa-hackerrank"></i> HackerRank Rating + Link</label>
                    <input type="text" id="hackerrankRating" class="form-control" placeholder="Rating">
                    <input type="url" id="hackerrankLink" class="form-control" placeholder="https://www.hackerrank.com/..." style="margin-top:8px;">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-code-branch"></i> LeetCode Score + Link</label>
                    <input type="text" id="leetcodeScore" class="form-control" placeholder="Score">
                    <input type="url" id="leetcodeLink" class="form-control" placeholder="https://leetcode.com/..." style="margin-top:8px;">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-chart-bar"></i> CoCubes Score</label>
                    <input type="text" id="cocubeScore" class="form-control" placeholder="CoCubes score">
                </div>
                <div class="form-group full-width">
                    <label><i class="fas fa-trophy"></i> Achievements & Certifications</label>
                    <textarea id="achievements" class="form-control" placeholder="• Winner Hackathon 2024&#10;• AWS Certified Practitioner&#10;• Published Research Paper"></textarea>
                </div>
                <div class="form-group full-width">
                    <label><i class="fas fa-medal"></i> Technical Achievement</label>
                    <textarea id="technicalAchievement" class="form-control" placeholder="Technical achievements"></textarea>
                </div>
                <div class="form-group full-width">
                    <label><i class="fas fa-star"></i> Personal Achievement</label>
                    <textarea id="personalAchievement" class="form-control" placeholder="Personal achievements"></textarea>
                </div>
                <div class="form-group full-width">
                    <label><i class="fas fa-diagram-project"></i> Project</label>
                    <textarea id="projectDetails" class="form-control" placeholder="Mention your major projects"></textarea>
                </div>
            </div>
            <div style="display: flex; justify-content: flex-end;">
                <button class="save-btn" onclick="updateProfile()">
                    <i class="fas fa-save"></i> Save All Changes
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const studentId = localStorage.getItem("studentId");
    const studentToken = localStorage.getItem("token");

    // Redirect if not logged in
    if (!studentId || !studentToken) {
        window.location.href = "student_login.html";
    }

    // Helper: show toast
    function showSuccess(message) {
        const successDiv = document.getElementById("successAlert");
        document.getElementById("successMsg").innerHTML = message;
        successDiv.style.display = "block";
        setTimeout(() => { successDiv.style.display = "none"; }, 4500);
    }
    function showError(message) {
        const errorDiv = document.getElementById("errorAlert");
        document.getElementById("errorMsg").innerHTML = message;
        errorDiv.style.display = "block";
        setTimeout(() => { errorDiv.style.display = "none"; }, 4500);
    }

    // simple escape to avoid XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // UPDATE PROFILE - criteria excluded from payload
    async function updateProfile() {
        try {
            const cgpaVal = document.getElementById("cgpa").value;
            if (cgpaVal && (cgpaVal < 0 || cgpaVal > 10)) {
                showError("CGPA must be between 0 and 10.");
                return;
            }

            const payload = {
                name: document.getElementById("name").value,

                branch: document.getElementById("branch").value,

            const r = await updateStudentProfile(studentId, payload);
            if (r.ok) {

            }
        } catch (error) {
            showError("Network error. Please try again.");

    }

    async function uploadFile(type) {
        const fileInput = document.getElementById(type + 'File');
        const file = fileInput.files[0];
        if (!file) { showError(`Select a ${type} file first.`); return; }
        if (file.size > 5 * 1024 * 1024) { showError("File must be less than 5MB."); return; }

        const endpoint = type === 'resume' ? 'uploadResume' : (type === 'photo' ? 'uploadPhoto' : 'uploadCertificate');
        
        try {
            const r = await uploadStudentFile(endpoint, studentId, file);
            if (r.ok) {
                showSuccess(`${type.charAt(0).toUpperCase() + type.slice(1)} uploaded successfully!`);
                fileInput.value = "";
                loadProfile();
            } else {
                showError(r.error || "Upload failed");
            }
        } catch (e) {
            showError(`Network error while uploading ${type}.`);
        }
    }

    // Wrap individual upload functions to call universal uploadFile
    window.uploadResume = () => uploadFile('resume');
    window.uploadPhoto = () => uploadFile('photo');
    window.uploadCertificate = () => uploadFile('certificate');

    function logout() {
        localStorage.removeItem("token");
        localStorage.removeItem("studentId");
        document.cookie = 'studentToken=; Max-Age=0; path=/';
        document.cookie = 'studentId=; Max-Age=0; path=/';
        window.location.href = "student_login.html";
    }

    document.getElementById('resumeFile').addEventListener('change', function(e) {
