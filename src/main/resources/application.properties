# ============================================
# ? DATABASE CONFIGURATION
# ============================================
# Connect to MySQL by default, using the Placement_portal database.
# Override with SPRING_DATASOURCE_URL and credentials if needed.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/Placement_portal?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:DBMS}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# Enable H2 console only if H2 is used via SPRING_DATASOURCE_URL override.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================
# ? JPA / HIBERNATE CONFIGURATION
# ============================================
# Automatically creates/updates tables based on your Entity classes
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console
spring.jpa.show-sql=true

# Configure dialect via environment when using MySQL, otherwise default to MySQL dialect.
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.MySQLDialect}

# ============================================
# ? SERVER CONFIGURATION
# ============================================
server.port=9090

# ============================================
# ? GOOGLE OAUTH2 CLIENT CONFIGURATION
# ============================================
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}

# ============================================
# ? JWT (Security Token) Configuration (Optional, you can use later)
# ============================================
jwt.secret=placementPortalSecretKey
jwt.expiration=86400000

# ============================================
# ? LOGGING (optional)
# ============================================
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG